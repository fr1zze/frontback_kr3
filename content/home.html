<section class="home-content">
  <div class="content-head">
    <h2>Добавить заметку</h2>
    <p class="muted">Обычная заметка или заметка с напоминанием.</p>
  </div>

  <form id="note-form" class="form">
    <input id="note-input" type="text" placeholder="Введите заметку..." required />
    <button id="submit-btn" type="submit">Добавить</button>
    <button id="cancel-edit-btn" type="button" class="ghost hidden">Отмена</button>
  </form>

  <form id="reminder-form" class="form form--reminder">
    <input
      id="reminder-text"
      type="text"
      placeholder="Текст напоминания..."
      required
    />
    <input id="reminder-time" type="datetime-local" required />
    <button id="reminder-submit-btn" type="submit">Добавить с напоминанием</button>
  </form>

  <div class="toolbar">
    <div class="toolbar__left">
      <span id="notes-count">Заметок: 0</span>
    </div>
    <button id="clear-all-btn" type="button" class="danger ghost">
      Очистить всё
    </button>
  </div>

  <ul id="notes-list" class="notes-list"></ul>

  <div id="empty-state" class="empty hidden">
    Пока заметок нет. Добавь первую заметку.
  </div>
</section>
