<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Заметки</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111111" />
  <meta name="description" content="Приложение заметок с App Shell, WebSocket и Push" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-128.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-256.png" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">PWA • Практики 13–16</p>
        <h1>Заметки</h1>
        <p class="subtitle">
          
        </p>
      </div>
      <div id="network-status" class="network online">Вы онлайн</div>
    </header>

    <nav class="tabs">
      <button id="home-btn" class="tab active" type="button">Главная</button>
      <button id="about-btn" class="tab" type="button">О приложении</button>
    </nav>

    <main id="app-content" class="panel">
      
    </main>

    <footer class="panel footer-panel">
      <div class="footer-actions">
        <button id="enable-push" class="install-btn" type="button">
          Включить уведомления
        </button>
        <button id="disable-push" class="ghost hidden" type="button">
          Отключить уведомления
        </button>
        <button id="install-btn" class="ghost hidden" type="button">
          Установить приложение
        </button>
      </div>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="./app.js"></script>
</body>
</html>
